apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-push
spec:
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
      default: main
    - name: image
      type: string
  workspaces:
    - name: source
    - name: git-auth
      optional: true
    - name: image-auth
      optional: true
  tasks:
    - name: checkout
      taskRef:
        resolver: http
        params:
          - name: url
            value: https://raw.githubusercontent.com/kudeploy/kudeploy-manifests/main/tekton/tasks/git-clone.yaml
      workspaces:
        - name: output
          workspace: source
        - name: basic-auth
          workspace: git-auth
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
        - name: depth
          value: "1"
        - name: deleteExisting
          value: "true"
    - name: configure-buildah
      runAfter:
        - checkout
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: write-registries-conf
            image: cgr.dev/chainguard/busybox@sha256:19f02276bf8dbdd62f069b922f10c65262cc34b710eea26ff928129a736be791
            script: |
              set -eu
              mkdir -p "$(workspaces.source.path)/.kudeploy/containers"
              cat > "$(workspaces.source.path)/.kudeploy/containers/registries.conf" <<'EOF'
              unqualified-search-registries = ["docker.io"]
              short-name-mode = "permissive"
              EOF
      workspaces:
        - name: source
          workspace: source
    - name: build-and-push
      runAfter:
        - configure-buildah
      taskRef:
        resolver: http
        params:
          - name: url
            value: https://raw.githubusercontent.com/kudeploy/kudeploy-manifests/main/tekton/tasks/buildah.yaml
      workspaces:
        - name: source
          workspace: source
        - name: dockerconfig
          workspace: image-auth
      params:
        - name: IMAGE
          value: $(params.image)
        - name: BUILDAH_GLOBAL_ARGS
          value: --registries-conf=/workspace/source/.kudeploy/containers/registries.conf
