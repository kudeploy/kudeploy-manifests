apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-push
spec:
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
      default: main
    - name: image
      type: string
  workspaces:
    - name: source
    - name: git-auth
    - name: image-auth
      optional: true
  tasks:
    - name: checkout
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/tektoncd/catalog.git
          - name: revision
            value: dd7cc22f2965ff4c9d8855b7161c2ffe94b6153e
          - name: pathInRepo
            value: task/git-clone/0.10/git-clone.yaml
      workspaces:
        - name: output
          workspace: source
        - name: basic-auth
          workspace: git-auth
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
        - name: depth
          value: "1"
        - name: deleteExisting
          value: "true"
    - name: prepare-image-auth
      taskSpec:
        workspaces:
          - name: image-auth
            optional: true
        steps:
          - name: ensure-docker-config
            image: cgr.dev/chainguard/busybox:latest
            script: |
              #!/bin/sh
              set -eu

              if [ "$(workspaces.image-auth.bound)" != "true" ]; then
                exit 0
              fi

              if [ ! -f "$(workspaces.image-auth.path)/config.json" ]; then
                printf '{}\n' > "$(workspaces.image-auth.path)/config.json"
              fi
      workspaces:
        - name: image-auth
          workspace: image-auth
    - name: build-and-push
      runAfter:
        - checkout
        - prepare-image-auth
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/tektoncd/catalog.git
          - name: revision
            value: cbc42eb541d822bd7b3fad85b5bb76727152eb9e
          - name: pathInRepo
            value: task/buildah/0.9/buildah.yaml
      workspaces:
        - name: source
          workspace: source
        - name: dockerconfig
          workspace: image-auth
      params:
        - name: IMAGE
          value: $(params.image)
